name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck jq ripgrep
      - run: bash -n setup-mirrors.sh scripts/*.sh
      - run: bash scripts/validate-json.sh
      - run: bash setup-mirrors.sh --config mirrors.json --output /tmp/.env.mirrors --report /tmp/mirror-report.json --timeout 3
      - run: bash scripts/smoke-test.sh
      - run: shellcheck setup-mirrors.sh scripts/*.sh
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
        working-directory: docs-site
      - run: npm run build
        working-directory: docs-site
      - run: test -d docs-site/dist
      - run: test -f docs-site/dist/assets/tailwind.css
      - run: '! rg -n -i "cdn\.tailwindcss|fonts\.googleapis|unpkg|jsdelivr" docs-site/dist'
