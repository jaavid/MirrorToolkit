<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MirrorToolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ["system-ui", "-apple-system", "Segoe UI", "Roboto", "Helvetica Neue", "Arial", "Noto Sans", "sans-serif"] },
          colors: { primary: { 400: "#22d3ee" }, surface: { 900: "#0f172a" } }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
  <main class="mx-auto max-w-7xl px-4 py-4 md:px-6 md:py-6">
    <header class="rounded-xl border border-white/10 bg-white/5 p-4">
      <h1 class="text-2xl font-bold">MirrorToolkit</h1>
      <p class="mt-1 text-sm text-slate-300">Start with a mirror check. Review the fastest reachable mirrors. Then paste your Dockerfile and download the mirror-aware version.</p>
      <p id="statusMessage" role="status" class="mt-2 text-sm text-slate-300">Loading mirrors.json...</p>
    </header>

    <section id="workflowSection" class="mt-3"></section>
    <section id="actionsSection" class="mt-3"></section>
    <section id="summary" class="mt-3"></section>
    <section id="categoryOverview" class="mt-3"></section>
    <section id="latencySection" class="mt-3"></section>
    <section id="envSection" class="mt-3"></section>
    <section id="dockerfileSection" class="mt-3"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
