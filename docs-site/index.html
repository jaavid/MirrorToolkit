<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MirrorToolkit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["system-ui", "-apple-system", "Segoe UI", "Roboto", "Helvetica Neue", "Arial", "Noto Sans", "sans-serif"]
          },
          colors: {
            primary: { 400: "#22d3ee", 500: "#06b6d4", 600: "#0891b2" },
            success: { 500: "#10b981" },
            danger: { 500: "#f43f5e" },
            warning: { 500: "#f59e0b" },
            surface: { 800: "#1e293b", 900: "#0f172a" }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
  <main class="mx-auto max-w-7xl px-4 py-6 md:px-6 md:py-10">
    <header class="rounded-2xl border border-white/10 bg-white/5 p-6 shadow">
      <h1 class="text-3xl font-bold md:text-4xl">MirrorToolkit</h1>
      <p class="mt-2 text-slate-300">Benchmark package mirrors and generate build-friendly env files.</p>
      <div class="mt-4 flex flex-wrap gap-2 text-sm">
        <span class="rounded-full border border-white/10 bg-white/10 px-3 py-1">CLI-first</span>
        <span class="rounded-full border border-white/10 bg-white/10 px-3 py-1">Static GitHub Pages</span>
        <span class="rounded-full border border-white/10 bg-white/10 px-3 py-1">Dockerfile Optimizer</span>
        <span class="rounded-full border border-white/10 bg-white/10 px-3 py-1">No backend</span>
      </div>
    </header>

    <section class="mt-5 rounded-2xl border border-white/10 bg-white/5 p-4 shadow">
      <h2 class="sr-only">Actions</h2>
      <div class="flex flex-wrap gap-2">
        <button id="runBenchmark" class="rounded-xl bg-cyan-400 px-4 py-2 font-medium text-slate-950 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300">Run benchmark</button>
        <button id="copyEnv" class="rounded-xl bg-white/10 px-4 py-2 hover:bg-white/15 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300">Copy generated env</button>
        <button id="downloadReport" class="rounded-xl bg-white/10 px-4 py-2 hover:bg-white/15 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300">Download mirror-report.json</button>
        <label class="cursor-pointer rounded-xl bg-white/10 px-4 py-2 hover:bg-white/15 focus-within:ring-2 focus-within:ring-cyan-300">Upload mirrors.json
          <input id="mirrorsFile" type="file" accept=".json,application/json" class="hidden" aria-label="Upload mirrors json">
        </label>
        <label class="cursor-pointer rounded-xl bg-white/10 px-4 py-2 hover:bg-white/15 focus-within:ring-2 focus-within:ring-cyan-300">Upload Dockerfile
          <input id="dockerfileUpload" type="file" class="hidden" aria-label="Upload Dockerfile">
        </label>
      </div>
      <p id="statusMessage" role="status" class="mt-3 text-sm text-slate-300">Loading mirrors.json...</p>
    </section>

    <section id="summary" class="mt-5 grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-5"></section>
    <section id="categoryFilters" class="mt-4"></section>
    <section id="latencySection" class="mt-4"></section>

    <section class="mt-5 rounded-2xl border border-white/10 bg-white/5 p-4 shadow">
      <div class="mb-3 flex items-center justify-between gap-3">
        <h2 class="text-xl font-semibold">Generated env</h2>
        <button id="copyEnvInline" class="rounded-xl bg-white/10 px-4 py-2 hover:bg-white/15 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300">Copy</button>
      </div>
      <label for="envOutput" class="mb-2 block text-sm text-slate-300">Generated environment variables</label>
      <textarea id="envOutput" rows="7" readonly class="w-full rounded-xl border border-white/10 bg-slate-900 px-3 py-2 text-sm text-slate-100"></textarea>
      <p class="mt-2 text-sm text-amber-200">Browser benchmark is approximate because CORS may affect results. CLI output is authoritative.</p>
    </section>

    <section id="dockerfileSection" class="mt-5"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
