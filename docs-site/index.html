<!doctype html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>MirrorToolkit</title><link rel='stylesheet' href='style.css'></head>
<body><main>
<h1>MirrorToolkit</h1>
<p>Small CLI + static helper page for selecting working mirrors and improving Docker builds.</p>
<p class='note'>Browser benchmark is approximate because CORS may block direct registry checks. The CLI benchmark is authoritative.</p>
<div class='actions'>
<button id='runBenchmark'>Run benchmark</button>
<button id='copyEnv'>Copy generated env</button>
<button id='downloadReport'>Download mirror-report.json</button>
<label class='btn'>Upload mirrors.json <input id='mirrorsFile' type='file' accept='.json,application/json'></label>
</div>
<div id='summary' class='summary'></div>
<div id='mirrorsContainer'></div>
<h2>Dockerfile optimizer</h2>
<div class='actions'>
<label class='btn'>Upload Dockerfile <input id='dockerfileUpload' type='file'></label>
<button id='optimizeDockerfile'>Optimize Dockerfile</button>
<a id='downloadOptimized' class='btn' style='display:none'>Download optimized Dockerfile</a>
</div>
<textarea id='dockerfileInput' rows='12' placeholder='Paste Dockerfile'></textarea>
<pre id='dockerfileOutput'></pre>
</main><script src='app.js'></script></body></html>
